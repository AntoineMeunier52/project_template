name: ${COMPOSE_PROJECT_NAME}

services:
  db:
    image: postgres:17
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "127.0.0.1:${DB_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - internal

  api:
    build:
      context: ./api
      dockerfile: ../docker/api/Dockerfile
    restart: unless-stopped
    depends_on:
      - db
    environment:
      APP_ENV: dev
      APP_DEBUG: 1
      SERVER_NAME: :80
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}?serverVersion=17&charset=utf8
    volumes:
      - ./api:/app
      - /app/var
      - ./docker/api/Caddyfile:/etc/caddy/Caddyfile:ro
      - ./docker/api/php.dev.ini:/usr/local/etc/php/conf.d/zz-dev.ini:ro
    labels:
      - traefik.enable=true
      - traefik.docker.network=proxy
      - traefik.http.routers.${COMPOSE_PROJECT_NAME}-api.rule=Host(`${API_DOMAIN}`)
      - traefik.http.routers.${COMPOSE_PROJECT_NAME}-api.entrypoints=websecure
      - traefik.http.routers.${COMPOSE_PROJECT_NAME}-api.tls=true
      - traefik.http.services.${COMPOSE_PROJECT_NAME}-api.loadbalancer.server.port=80
    networks:
      - internal
      - proxy

  front:
    build:
      context: ./front
      dockerfile: ../docker/front/Dockerfile
    restart: unless-stopped
    depends_on:
      - api
    environment:
      NUXT_PUBLIC_API_BASE: https://${API_DOMAIN}
      HOST: 0.0.0.0
      PORT: 3000
      CHOKIDAR_USEPOLLING: "true"
      NODE_EXTRA_CA_CERTS: /usr/local/share/ca-certificates/rootCA.pem
    volumes:
      - ./front:/app
      - /app/node_modules
      - /app/.nuxt
      - ${HOME}/.local/share/mkcert/rootCA.pem:/usr/local/share/ca-certificates/rootCA.pem:ro
    command: sh -lc "npm install && npm run dev -- --host 0.0.0.0 --port 3000"
    labels:
      - traefik.enable=true
      - traefik.docker.network=proxy
      - traefik.http.routers.${COMPOSE_PROJECT_NAME}-front.rule=Host(`${APP_DOMAIN}`)
      - traefik.http.routers.${COMPOSE_PROJECT_NAME}-front.entrypoints=websecure
      - traefik.http.routers.${COMPOSE_PROJECT_NAME}-front.tls=true
      - traefik.http.services.${COMPOSE_PROJECT_NAME}-front.loadbalancer.server.port=3000
    networks:
      - internal
      - proxy

volumes:
  postgres_data:

networks:
  internal:
  proxy:
    external: true